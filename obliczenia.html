<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Stacja paliw</title>
    <link rel="stylesheet" href="styl2.css">
</head>

<body>
    <header>
        <h1>Całodobowa stacja paliw</h1>
    </header>

    <nav>
        <a href="stacja.html"><img src="home.png" alt="home"></a>
        <a href="obliczenia.html"><img src="znak.png" alt="obliczenia"></a>
        <a href="kwerendy.txt">Pobierz dokumenty</a>
    </nav>

    <main>
        <section id="lewy">
            <h2>Orientacyjny koszt paliwa</h2>
            <label for="rodzaj">Rodzaj paliwa (1-benzyna, 2-olej napędowy):</label><br>
            <input type="number" id="rodzaj"><br>
            <label for="litry">Ile litrów?</label><br>
            <input type="number" id="litry"><br>
            <button onclick="oblicz()">OBLICZ</button>
            <p id="wynik"></p>
            <script>
                function oblicz() {
                    let rodzaj = document.getElementById('rodzaj').value;
                    let ile_litrow = document.getElementById('litry').value;
                    let koszt = 0;
                    rodzaj = parseInt(rodzaj);
                    ile_litrow = parseFloat(ile_litrow);
                    if (rodzaj === 1) {
                        koszt = ile_litrow * 4;
                    } else if (rodzaj === 2) {
                        koszt = ile_litrow * 3.5;
                    } else {
                        koszt = 0;
                    }
                    document.getElementById('wynik').innerHTML = "koszt paliwa: " + koszt + " zł";
                }
            </script>
        </section>
        <section id="prawy">
            <img src="samochod.png" alt="samochód">
        </section>
    </main>
    <footer>
        <p>Stronę opracował: 00000000000</p>
    </footer>
</body>

</html>
